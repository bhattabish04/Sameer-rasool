<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sameer Rasool</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    color: white;
    background: #0f172a;
}

/* Navbar */
nav {
    display: flex;
    justify-content: space-between;
    padding: 15px 30px;
    background: black;
}

nav h1 {
    color: #38bdf8;
}

nav a {
    color: white;
    margin-left: 15px;
    text-decoration: none;
}

/* Hero */
.hero {
    text-align: center;
    padding: 80px 20px;
    background: url('https://images.unsplash.com/photo-1512436991641-6745cdb1723f') center/cover;
}

.hero h2 {
    font-size: 40px;
}

.btn {
    padding: 10px 20px;
    background: #38bdf8;
    color: black;
    text-decoration: none;
}

/* Products */
.products {
    padding: 40px;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 20px;
}

.card {
    background: #1e293b;
    padding: 15px;
    border-radius: 10px;
    text-align: center;
}

.card img {
    width: 100%;
    border-radius: 10px;
}

.price {
    color: #38bdf8;
    font-weight: bold;
}

/* Footer */
footer {
    background: black;
    padding: 20px;
    text-align: center;
}
</style>
</head>

<body>

<nav>
    <h1>Sameer Rasool</h1>
    <div>
        <a href="#">Home</a>
        <a href="#products">Shop</a>
        <a href="#contact">Contact</a>
    </div>
</nav>

<section class="hero">
    <h2>🔥 All Items ₹499 🔥</h2>
    <p>Premium Clothing Brand</p>
    <a href="#products" class="btn">Shop Now</a>
</section>

<section id="products" class="products">
    <div class="card">
        <img src="https://images.unsplash.com/photo-1521572163474-6864f9cf17ab">
        <h3>T-Shirt</h3>
        <p class="price">₹499</p>
        <a href="https://instagram.com/bhatsameer09" class="btn">Order</a>
    </div>

    <div class="card">
        <img src="https://images.unsplash.com/photo-1602810318383-e386cc2a3ccf">
        <h3>Hoodie</h3>
        <p class="price">₹499</p>
        <a href="https://instagram.com/bhatsameer09" class="btn">Order</a>
    </div>

    <div class="card">
        <img src="https://images.unsplash.com/photo-1593030761757-71fae45fa0e7">
        <h3>Shirt</h3>
        <p class="price">₹499</p>
        <a href="https://instagram.com/bhatsameer09" class="btn">Order</a>
    </div>
</section>

<section id="contact" style="text-align:center; padding:40px;">
    <h2>Contact</h2>
    <p>Instagram: @bhat_tabish_04</p>
    <p>Phone: +91 78898 26727</p>
</section>

<footer>
    <p>© 2026 Sameer Rasool</p>
</footer>

</body>
</html>
