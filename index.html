<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sameer Rasool</title>

<!-- Favicon -->
<link rel="icon" href="https://images.unsplash.com/photo-1593030761757-71fae45fa0e7" type="image/png">

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0f172a;
    color: white;
    scroll-behavior: smooth;
}

/* NAVBAR */
nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 30px;
    background: rgba(0,0,0,0.8);
    position: sticky;
    top: 0;
    z-index: 1000;
}

nav h1 {
    color: #38bdf8;
    display: flex;
    align-items: center;
    gap: 10px;
}

nav h1 img {
    width: 40px;
    height: 40px;
    border-radius: 50%;
}

nav a {
    color: white;
    margin-left: 20px;
    text-decoration: none;
    transition: 0.3s;
}

nav a:hover {
    color: #38bdf8;
}

/* HERO */
.hero {
    height: 90vh;
    background: url('https://images.unsplash.com/photo-1512436991641-6745cdb1723f') center/cover no-repeat;
    background-size: cover;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    text-align: center;
}

.hero h2 {
    font-size: 50px;
    margin: 0;
}

.hero p {
    font-size: 20px;
}

.btn {
    margin-top: 20px;
    padding: 12px 25px;
    background: #38bdf8;
    color: black;
    text-decoration: none;
    border-radius: 5px;
    transition: 0.3s;
}

.btn:hover {
    background: #0ea5e9;
    color: white;
}

/* PRODUCTS */
.products {
    padding: 50px 20px;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 25px;
}

.card {
    background: #1e293b;
    padding: 15px;
    border-radius: 10px;
    transition: 0.3s;
    text-align: center;
}

.card:hover {
    transform: translateY(-10px);
}

.card img {
    width: 100%;
    border-radius: 10px;
}

.price {
    color: #38bdf8;
    font-size: 18px;
    font-weight: bold;
    margin: 10px 0;
}

/* WHATSAPP BUTTON */
.whatsapp {
    display: inline-block;
    margin-top: 10px;
    padding: 10px 15px;
    background: #25D366;
    color: white;
    text-decoration: none;
    border-radius: 5px;
    transition: 0.3s;
}

.whatsapp:hover {
    background: #1ebe5d;
}

/* CONTACT */
#contact h2 {
    font-size: 36px;
    margin-bottom: 10px;
}

#contact p {
    font-size: 18px;
}

/* FOOTER */
footer {
    background: black;
    padding: 20px;
    text-align: center;
    font-size: 16px;
}
</style>
</head>

<body>

<!-- NAVBAR -->
<nav>
    <h1>
        <img src="https://images.unsplash.com/photo-1593030761757-71fae45fa0e7" alt="Logo">
        Sameer Rasool
    </h1>
    <div>
        <a href="#">Home</a>
        <a href="#products">Shop</a>
        <a href="#contact">Contact</a>
    </div>
</nav>

<!-- HERO -->
<section class="hero">
    <h2>🔥 All Items ₹499 🔥</h2>
    <p>Premium Clothing Brand</p>
    <a href="#products" class="btn">Shop Now</a>
</section>

<!-- PRODUCTS -->
<section id="products" class="products">

    <div class="card">
        <img src="https://images.unsplash.com/photo-1521572163474-6864f9cf17ab" alt="T-Shirt">
        <h3>T-Shirt</h3>
        <p class="price">₹499</p>
        <a href="https://wa.me/917889826727" class="whatsapp">Order on WhatsApp</a>
    </div>

    <div class="card">
        <img src="https://images.unsplash.com/photo-1602810318383-e386cc2a3ccf" alt="Hoodie">
        <h3>Hoodie</h3>
        <p class="price">₹499</p>
        <a href="https://wa.me/917889826727" class="whatsapp">Order on WhatsApp</a>
    </div>

    <div class="card">
        <img src="https://images.unsplash.com/photo-1593030761757-71fae45fa0e7" alt="Shirt">
        <h3>Shirt</h3>
        <p class="price">₹499</p>
        <a href="https://wa.me/917889826727" class="whatsapp">Order on WhatsApp</a>
    </div>

</section>

<!-- CONTACT -->
<section id="contact" style="text-align:center; padding:40px;">
    <h2>Contact</h2>
    <p>📱 Instagram: @bhat_tabish_04</p>
    <p>📞 Phone: +91 78898 26727</p>
</section>

<!-- FOOTER -->
<footer>
    <p>© 2026 Sameer Rasool</p>
</footer>

</body>
</html>
